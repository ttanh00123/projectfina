name: taexpense
description: "FinA - Personal Finance App"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
    
  intl: ^0.19.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  shared_preferences: ^2.2.2
  http_status_code: ^0.0.2
  provider: ^6.1.1
  speech_to_text: ^7.0.0
  http: ^1.2.2
  sqflite: ^2.4.1
  google_sign_in: ^6.0.0
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
  uuid: ^4.4.0
  fl_chart: ^0.68.0
  flutter_svg: ^2.2.2
  format: ^1.5.2
  flutter_local_notifications: ^17.1.2
  logger: ^2.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/
